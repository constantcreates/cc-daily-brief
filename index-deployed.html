<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constant Creates — Daily Brief</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a2428'/><text x='16' y='22' font-size='18' font-family='serif' font-weight='bold' fill='%23c8d9a0' text-anchor='middle'>CC</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--dark:#1a2428;--forest:#263633;--green:#4a6650;--sage:#c8d9a0;--cream:#f0edd8;--light:#F7F6F1;--white:#fff;--warn:#f59e0b;--danger:#ef4444;--success:#22c55e}
body{font-family:'Poppins',system-ui,sans-serif;background:var(--dark);color:var(--cream);line-height:1.6;-webkit-font-smoothing:antialiased}
.container{max-width:1200px;margin:0 auto;padding:0 20px}
a{color:var(--sage);text-decoration:none;transition:color .2s}
a:hover{color:var(--white);text-decoration:underline}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade-in{animation:fadeInUp .5s ease-out forwards;opacity:0}
.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}.d4{animation-delay:.4s}.d5{animation-delay:.5s}.d6{animation-delay:.6s}.d7{animation-delay:.7s}.d8{animation-delay:.8s}.d9{animation-delay:.9s}

header{border-bottom:1px solid rgba(74,102,80,.3);background:rgba(26,36,40,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 0}
.logo-group{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;border-radius:10px;background:rgba(200,217,160,.2);display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text h1{font-size:16px;font-weight:600;letter-spacing:-.02em;color:var(--white)}
.logo-text p{font-size:10px;color:var(--sage);text-transform:uppercase;letter-spacing:.15em}
.status-badge{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);font-size:11px;color:#fcd34d;font-weight:500}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:#f59e0b;animation:pulse 2s ease-in-out infinite}

.card{border-radius:16px;background:rgba(38,54,51,.6);border:1px solid rgba(74,102,80,.2);padding:24px;position:relative;overflow:hidden;margin-bottom:20px}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--sage),transparent);opacity:.35}
.card-accent{background:linear-gradient(135deg,rgba(38,54,51,.9),rgba(74,102,80,.25));border-color:rgba(200,217,160,.25)}
.section-title{font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:16px;color:var(--white)}
.badge{font-size:10px;font-weight:600;text-transform:capitalize;padding:4px 12px;border-radius:999px;letter-spacing:.03em}
.badge-green{background:rgba(200,217,160,.18);color:var(--sage)}
.badge-red{background:rgba(239,68,68,.15);color:#fca5a5}
.badge-yellow{background:rgba(245,158,11,.15);color:#fcd34d}
.badge-blue{background:rgba(96,165,250,.15);color:#93c5fd}
.badge-purple{background:rgba(192,132,252,.15);color:#d8b4fe}
.badge-amber{background:rgba(251,191,36,.15);color:#fcd34d}
.badge-cyan{background:rgba(34,211,238,.15);color:#67e8f9}

.metrics{display:grid;gap:12px;margin-bottom:20px}
.m4{grid-template-columns:repeat(4,1fr)}
.m3{grid-template-columns:repeat(3,1fr)}
.m5{grid-template-columns:repeat(5,1fr)}
@media(max-width:768px){.m4,.m5{grid-template-columns:repeat(2,1fr)}.m3{grid-template-columns:repeat(3,1fr)}}
.metric{background:rgba(26,36,40,.5);border-radius:12px;padding:16px;border:1px solid rgba(74,102,80,.15)}
.metric-sm{text-align:center;padding:14px}
.metric-label{font-size:11px;color:rgba(240,237,216,.6);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:500}
.metric-value{font-size:22px;font-weight:700;color:var(--white)}
.metric-sub{font-size:11px;color:rgba(200,217,160,.6);margin-top:4px}
.metric-warn .metric-value{color:var(--warn)}
.metric-danger .metric-value{color:var(--danger)}

.progress-wrap{margin-bottom:20px}
.progress-header{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px}
.progress-bar{height:10px;background:rgba(26,36,40,.6);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;border-radius:999px;transition:width 1s}
.progress-footer{display:flex;justify-content:space-between;font-size:12px;color:rgba(240,237,216,.5);margin-top:6px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:768px){.grid-3{grid-template-columns:1fr}}

.lead-card{background:rgba(26,36,40,.4);border-radius:12px;padding:14px;border:1px solid rgba(74,102,80,.15);margin-bottom:10px}
.lead-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.lead-name{font-size:14px;font-weight:600;color:var(--white)}
.lead-loc{font-size:11px;color:rgba(240,237,216,.5)}
.lead-score{font-size:12px;font-weight:700;color:var(--sage);background:rgba(200,217,160,.18);padding:3px 10px;border-radius:999px}
.lead-reason{font-size:12px;color:rgba(240,237,216,.6);margin-top:4px;line-height:1.6}
.lead-links{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.lead-link{font-size:10px;font-weight:600;padding:4px 10px;border-radius:999px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:all .2s}
.lead-link:hover{text-decoration:none;filter:brightness(1.2)}
.lead-link-primary{background:rgba(200,217,160,.2);color:var(--sage);border:1px solid rgba(200,217,160,.3)}
.lead-link-secondary{background:rgba(96,165,250,.12);color:#93c5fd;border:1px solid rgba(96,165,250,.2)}

.cal-item{display:flex;align-items:center;justify-content:space-between;background:rgba(26,36,40,.3);border-radius:10px;padding:10px 14px;margin-bottom:6px}
.cal-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;color:rgba(240,237,216,.85)}
.cal-title a{color:rgba(240,237,216,.85)}
.cal-title a:hover{color:var(--white)}

.opp-card{border-radius:14px;padding:18px;border:1px solid}
.opp-type{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;margin-left:8px}
.opp-title{font-size:14px;font-weight:600;margin:10px 0 6px;color:var(--white)}
.opp-desc{font-size:12px;color:rgba(240,237,216,.6);line-height:1.6}
.opp-links{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.opp-high{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.3)}
.opp-med{background:rgba(96,165,250,.06);border-color:rgba(96,165,250,.3)}
.opp-low{background:rgba(200,217,160,.06);border-color:rgba(200,217,160,.2)}

.action-item{display:flex;align-items:flex-start;gap:16px;border-radius:14px;padding:18px;background:rgba(26,36,40,.5);border:1px solid rgba(74,102,80,.15);margin-bottom:10px;transition:all .2s;cursor:pointer}
.action-item:hover{border-color:rgba(200,217,160,.35)}
.action-item.completed{opacity:.5;border-color:rgba(34,197,94,.3)}
.action-item.completed .action-text{text-decoration:line-through;color:rgba(240,237,216,.4)}
.action-check{width:28px;height:28px;border-radius:50%;border:2px solid rgba(200,217,160,.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--sage);flex-shrink:0;margin-top:2px;transition:all .2s}
.action-item.completed .action-check{background:var(--success);border-color:var(--success);color:var(--dark)}
.action-text{font-size:14px;font-weight:500;line-height:1.6;color:var(--white)}
.action-meta{display:flex;gap:12px;align-items:center;margin-top:8px;flex-wrap:wrap}
.action-meta-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;padding:4px 10px;border-radius:6px;background:rgba(74,102,80,.25);color:var(--sage)}
.action-time{font-size:10px;color:rgba(240,237,216,.5)}

footer{background:rgba(26,36,40,.6);border-top:1px solid rgba(74,102,80,.2);padding:16px 0;margin-top:40px;text-align:center;color:rgba(240,237,216,.5);font-size:11px}

.alert-container{display:flex;flex-direction:column;gap:12px}
.alert-item{background:rgba(26,36,40,.5);border-radius:12px;padding:16px;border:1px solid rgba(74,102,80,.2);border-left:4px solid var(--warn)}
.alert-title{font-size:13px;font-weight:600;color:var(--white);margin-bottom:6px}
.alert-desc{font-size:12px;color:rgba(240,237,216,.6);margin-bottom:8px;line-height:1.6}

.lock-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,36,40,.95);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:9999}
.lock-box{background:rgba(38,54,51,.8);border:1px solid rgba(200,217,160,.25);border-radius:20px;padding:40px;text-align:center;max-width:400px}
.lock-title{font-size:24px;font-weight:700;margin-bottom:16px}
.lock-desc{font-size:13px;color:rgba(240,237,216,.6);margin-bottom:24px;line-height:1.6}
.lock-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(200,217,160,.2);background:rgba(26,36,40,.5);color:var(--cream);font-size:14px;margin-bottom:16px}
.lock-input::placeholder{color:rgba(240,237,216,.4)}
.lock-btn{width:100%;padding:12px;border-radius:10px;background:var(--sage);color:var(--dark);border:none;font-weight:600;cursor:pointer;transition:all .2s;font-size:14px}
.lock-btn:hover{filter:brightness(0.9)}

@media(max-width:768px){.grid-2,.card{padding:16px}.section-title{font-size:15px}.action-item{padding:14px}.opp-card{padding:14px}}
#loading{display:flex;align-items:center;justify-content:center;height:80vh;font-size:14px;color:var(--sage)}
</style>
</head>
<body>

<!-- AUTH LOCK -->
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-box">
    <div class="lock-title">&#x1f512; Dashboard</div>
    <div class="lock-desc">This dashboard contains sensitive business information. Enter password to access.</div>
    <input type="password" id="lockInput" class="lock-input" placeholder="Enter password">
    <button class="lock-btn" onclick="checkPassword()">Unlock</button>
  </div>
</div>

<div id="loading">Loading dashboard data...</div>
<div id="app" style="display:none">

<!-- HEADER -->
<header class="fade-in d1">
  <div class="container">
    <div class="header-inner">
      <div class="logo-group">
        <div class="logo-icon">&#x1f33f;</div>
        <div class="logo-text">
          <h1>Constant Creates</h1>
          <p>Daily Brief</p>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:rgba(240,237,216,.5);margin-bottom:4px" id="hDate"></div>
        <div style="font-size:13px;font-weight:600;color:var(--white);margin-bottom:8px" id="hGreeting"></div>
        <div class="status-badge"><span class="pulse-dot"></span> <span id="hBadge"></span></div>
      </div>
    </div>
  </div>
</header>

<main class="container" style="padding-top:24px;padding-bottom:40px">
  <div id="sOverview"></div>
  <div id="sAlerts"></div>
  <div id="sScheduleRevenue"></div>
  <div id="sQ2"></div>
  <div id="sLeads"></div>
  <div id="sBlogSeo"></div>
  <div id="sSubsAuth"></div>
  <div id="sEmail"></div>
  <div id="sOpps"></div>
  <div id="sActions"></div>
  <div id="sClients"></div>
</main>

<footer class="fade-in d9" id="sFooter"></footer>

</div>

<script>
// PASSWORD PROTECTION via SHA-256
async function hashPassword(pw){
  const enc=new TextEncoder().encode(pw);
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPassword(){
  const input=document.getElementById("lockInput").value;
  const hash=await hashPassword(input);
  if(hash==="5abe73d87c6c3ba9822f62a7c7ebde38e16c08b779d2e0319acb660f6e16073f"){
    document.getElementById("lockOverlay").style.display="none";
    sessionStorage.setItem("cc-dash-auth","1");
    loadActionStates();
  }else{
    alert("Incorrect password");
    document.getElementById("lockInput").value="";
  }
}
if(sessionStorage.getItem("cc-dash-auth")==="1"){
  document.getElementById("lockOverlay").style.display="none";
}
document.getElementById("lockInput").addEventListener("keypress",function(e){
  if(e.key==="Enter") checkPassword();
});

// ACTION ITEM PERSISTENCE
function toggleAction(el,actionId){
  el.classList.toggle("completed");
  var dk=window._dateKey||"unknown";
  var states=JSON.parse(localStorage.getItem("ccActionStates-"+dk)||"{}");
  states[actionId]=el.classList.contains("completed");
  localStorage.setItem("ccActionStates-"+dk,JSON.stringify(states));
}
function loadActionStates(){
  var dk=window._dateKey||"unknown";
  var states=JSON.parse(localStorage.getItem("ccActionStates-"+dk)||"{}");
  Object.keys(states).forEach(function(actionId){
    if(states[actionId]){
      var el=document.getElementById(actionId);
      if(el){el.closest(".action-item").classList.add("completed")}
    }
  });
}

// RENDER HELPERS
function renderMetrics(arr, cols){
  return '<div class="metrics m'+cols+'">'+arr.map(function(m){
    var cls='metric metric-sm'+(m.class?' '+m.class:'');
    var vs=m.color?' style="color:'+m.color+'"':'';
    return '<div class="'+cls+'"><div class="metric-label">'+m.label+'</div><div class="metric-value"'+vs+'>'+m.value+'</div><div class="metric-sub">'+m.sub+'</div></div>';
  }).join('')+'</div>';
}

function render(d){
  window._dateKey=d.dateKey;
  document.getElementById("hDate").innerHTML=d.date;
  document.getElementById("hGreeting").innerHTML=d.greeting;
  document.getElementById("hBadge").innerHTML=d.statusBadge;

  // OVERVIEW
  document.getElementById("sOverview").innerHTML='<div class="card fade-in d2"><div class="section-title">&#x1f4ca; Today\'s Overview</div><div style="font-size:13px;line-height:1.8;color:rgba(240,237,216,.8)">'+d.overview+'</div></div>';

  // ALERTS
  document.getElementById("sAlerts").innerHTML='<div class="card fade-in d3"><div class="section-title">&#x26a0;&#xfe0f; Critical Alerts</div><div class="alert-container">'+d.alerts.map(function(a){return '<div class="alert-item" style="border-left-color:'+a.color+'"><div class="alert-title">'+a.title+'</div><div class="alert-desc">'+a.description+'</div></div>';}).join('')+'</div></div>';

  // SCHEDULE + REVENUE
  var schedHtml=d.schedule.events.map(function(e){return '<div class="cal-item" style="border-left:3px solid '+e.color+'"><div class="cal-title">'+e.time+': '+e.title+'</div></div>';}).join('');
  var tipHtml='<div class="cal-item" style="background:rgba(200,217,160,.08)"><div class="cal-title" style="max-width:100%;white-space:normal;font-size:11px;color:var(--sage)">&#x1f4a1; '+d.schedule.dayTip+'</div></div>';
  var weekHtml=d.schedule.weekHighlights.map(function(w){var p=w.indexOf(':');return '<div>&bull; <strong>'+w.substring(0,p)+':</strong>'+w.substring(p+1)+'</div>';}).join('');
  var asanaHtml=d.schedule.asanaTasks?'<div style="margin-top:16px;padding:10px;background:rgba(239,68,68,.06);border-radius:8px;border:1px solid rgba(239,68,68,.15)"><div style="font-size:11px;color:#fca5a5;font-weight:600">&#x1f4cb; Asana Tasks Due (Migrate to Notion)</div><div style="font-size:10px;color:rgba(240,237,216,.6);margin-top:4px;line-height:1.6">'+d.schedule.asanaTasks+'</div></div>':'';

  var r=d.revenue;
  var metricsHtml=renderMetrics(r.metrics,4);
  var investHtml=r.outstandingInvoices.map(function(o,i){return '<div style="color:rgba(240,237,216,.7);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(74,102,80,.2)"><div style="font-weight:600;font-size:12px">'+o.client+'</div><div style="font-size:11px;color:var(--sage);margin-top:2px">'+o.amount+' — '+o.item+'</div><div style="font-size:10px;color:rgba(240,237,216,.5);margin-top:2px">'+o.status+' ('+o.dueDate+')</div></div>';}).join('');
  var chargesHtml=r.recentCharges.map(function(c){return '<div style="display:flex;justify-content:space-between;font-size:10px;color:rgba(240,237,216,.6);padding:6px 0;border-bottom:1px solid rgba(74,102,80,.15)"><span>'+c.vendor+'</span><span style="color:var(--cream);font-weight:500">'+c.amount+'</span></div>';}).join('');
  var fastCashHtml=r.fastestCashPaths.map(function(f){return '<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(74,102,80,.2)"><div style="font-weight:600;font-size:11px;color:var(--white)">'+f.rank+'. '+f.action+'</div><div style="font-size:10px;color:var(--sage);margin-top:3px">'+f.amount+' • '+f.timeline+' • '+f.effort+'</div></div>';}).join('');

  document.getElementById("sScheduleRevenue").innerHTML='<div class="grid-2"><div class="card fade-in d4"><div class="section-title">&#x1f4c5; Today\'s Schedule</div><div style="display:flex;flex-direction:column;gap:8px">'+schedHtml+tipHtml+'</div><div style="margin-top:20px;border-top:1px solid rgba(74,102,80,.2);padding-top:16px"><div style="font-size:12px;font-weight:600;color:var(--white);margin-bottom:10px">This Week Highlights</div><div style="display:flex;flex-direction:column;gap:6px;font-size:11px;color:rgba(240,237,216,.7)">'+weekHtml+'</div></div>'+asanaHtml+'</div><div class="card card-accent fade-in d4"><div class="section-title">&#x1f4b0; Revenue & Collections</div>'+metricsHtml+'<div style="margin-top:16px;padding:12px;background:rgba(26,36,40,.4);border-radius:10px"><div style="font-size:11px;color:rgba(240,237,216,.6);font-weight:600;margin-bottom:8px">OUTSTANDING INVOICES</div><div style="font-size:11px;color:rgba(240,237,216,.7)">'+investHtml+'</div></div><div style="margin-top:16px;padding:12px;background:rgba(26,36,40,.4);border-radius:10px"><div style="font-size:11px;color:rgba(240,237,216,.6);font-weight:600;margin-bottom:6px">RECENT CHARGES</div><div>'+chargesHtml+'</div></div><div style="margin-top:16px;padding:12px;background:rgba(200,217,160,.08);border-radius:10px;border:1px solid rgba(200,217,160,.15)"><div style="font-size:11px;color:var(--sage);font-weight:600;margin-bottom:6px">&#x1f4a1; FASTEST CASH PATHS</div><div style="font-size:11px;line-height:1.6">'+fastCashHtml+'</div></div></div></div>';

  // Q2 CAMPAIGN
  var q=d.q2Campaign;
  var vertHtml=q.verticals.map(function(v){
    var border='border:1px solid rgba(200,217,160,.2);';
    var nameExtra='';
    var sub=v.status==='existing'?'Established':'New batch';
    return '<div style="padding:10px;background:rgba(26,36,40,.4);border-radius:10px;text-align:center;'+border+'"><div style="font-size:10px;color:rgba(240,237,216,.5);text-transform:uppercase;letter-spacing:.08em">'+v.name+'</div><div style="font-size:16px;font-weight:700;color:var(--white);margin:4px 0">'+v.status+'</div><div style="font-size:10px;color:var(--sage)">'+sub+'</div></div>';
  }).join('');
  document.getElementById("sQ2").innerHTML='<div class="card card-accent fade-in d5"><div class="section-title">&#x1f680; Q2 Quick Launch Campaign &mdash; $999 Websites</div>'+renderMetrics(q.metrics,5)+'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:8px">'+vertHtml+'</div><div style="margin-top:16px;padding:12px;background:rgba(200,217,160,.08);border-radius:10px;border:1px solid rgba(200,217,160,.15)"><div style="font-size:11px;color:var(--sage);font-weight:600;margin-bottom:4px">NEXT STEPS</div><div style="font-size:11px;color:rgba(240,237,216,.7);line-height:1.6">'+q.nextSteps+'</div></div></div>';

  // LEADS
  var l=d.leads;
  var leadCards=l.cards.map(function(c){
    var links=(c.links||[]).map(function(lk){return '<a href="'+lk.url+'" target="_blank" class="lead-link lead-link-primary">&rarr; '+lk.text+'</a>';}).join('');
    return '<div class="lead-card" style="border-left:3px solid '+(c.borderColor||'rgba(74,102,80,.15)')+'"><div class="lead-header"><div><div class="lead-name">'+c.name+'</div><div class="lead-loc">'+c.location+'</div></div><span class="lead-score">'+c.score+'</span></div><div class="lead-reason">'+c.reason+'</div>'+(links?'<div class="lead-links">'+links+'</div>':'')+'</div>';
  }).join('');
