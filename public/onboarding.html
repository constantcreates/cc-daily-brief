<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Onboarding — Constant Creates</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a2428'/><text x='16' y='22' font-size='18' font-family='serif' font-weight='bold' fill='%23c8d9a0' text-anchor='middle'>CC</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--dark:#1a2428;--forest:#263633;--green:#4a6650;--sage:#c8d9a0;--cream:#f0edd8;--light:#F7F6F1;--white:#fff;--warn:#f59e0b;--danger:#ef4444;--success:#22c55e;--muted:#8a9a7e}
body{font-family:'Poppins',system-ui,sans-serif;background:var(--dark);color:var(--cream);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--sage);text-decoration:none;transition:color .2s}a:hover{color:var(--white)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--dark)}::-webkit-scrollbar-thumb{background:var(--green);border-radius:3px}

/* Animations */
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeInUp .5s ease-out forwards;opacity:0}
.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}.d4{animation-delay:.4s}.d5{animation-delay:.5s}.d6{animation-delay:.6s}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:0 20px}

/* Header */
.header{border-bottom:1px solid rgba(74,102,80,.2);background:rgba(26,36,40,.8);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 0}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;border-radius:8px;background:rgba(200,217,160,.15);display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;color:var(--sage)}
.logo-title{font-size:18px;font-weight:600;color:var(--cream);letter-spacing:-.02em}
.logo-sub{font-size:11px;color:rgba(200,217,160,.7);text-transform:uppercase;letter-spacing:.1em}
.status-badge{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:rgba(74,102,80,.15);border:1px solid rgba(74,102,80,.2)}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--sage);animation:pulse 2s ease-in-out infinite}
.status-text{font-size:12px;color:rgba(200,217,160,.8)}

/* Tab Navigation */
.tabs{display:flex;gap:4px;margin-top:0;border-top:1px solid rgba(74,102,80,.1);padding-top:0}
.tab{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:14px;font-weight:500;border-bottom:2px solid transparent;color:rgba(240,237,216,.4);cursor:pointer;transition:all .2s;text-decoration:none}
.tab:hover{color:rgba(240,237,216,.6);border-color:rgba(74,102,80,.3)}
.tab.active{color:var(--sage);border-color:var(--sage)}
.tab svg{width:16px;height:16px}

/* Cards */
.card{position:relative;overflow:hidden;border-radius:16px;background:rgba(38,54,51,.5);border:1px solid rgba(74,102,80,.15);padding:24px}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--sage),transparent);opacity:.5}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.stat-card{background:rgba(26,36,40,.4);border-radius:12px;padding:16px;border:1px solid rgba(74,102,80,.1)}
.stat-label{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.stat-label svg{width:14px;height:14px;color:rgba(200,217,160,.6)}
.stat-label span{font-size:10px;color:rgba(240,237,216,.5);text-transform:uppercase;letter-spacing:.1em}
.stat-value{font-size:20px;font-weight:600;color:var(--cream)}
.stat-value.accent{color:var(--sage)}
.stat-sub{font-size:11px;color:rgba(200,217,160,.6);margin-top:4px}

/* Client Card */
.client-card{border-radius:16px;background:rgba(38,54,51,.5);border:1px solid rgba(74,102,80,.15);overflow:hidden;position:relative}
.client-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--sage),transparent);opacity:.5}
.client-header{padding:20px 24px;cursor:pointer;transition:background .2s}
.client-header:hover{background:rgba(74,102,80,.05)}
.client-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.client-name{font-size:16px;font-weight:600;color:var(--cream)}
.client-pkg{display:inline-block;font-size:11px;padding:2px 10px;border-radius:999px;background:rgba(200,217,160,.15);color:var(--sage);font-weight:500;margin-left:10px}
.client-sub{font-size:12px;color:rgba(240,237,216,.4);margin-top:2px}
.client-pct{text-align:right}
.client-pct-val{font-size:20px;font-weight:600;color:var(--sage)}
.client-pct-sub{font-size:10px;color:rgba(240,237,216,.4)}
.chevron{width:16px;height:16px;color:rgba(240,237,216,.4);transition:transform .2s;margin-left:12px}
.chevron.open{transform:rotate(90deg)}

/* Phase Progress Bar */
.phase-bar{display:flex;gap:2px;width:100%;margin-bottom:4px}
.phase-segment{flex:1;height:8px;border-radius:4px;background:rgba(26,36,40,.6);overflow:hidden;position:relative}
.phase-segment.past{background:var(--sage)}
.phase-segment.active{background:rgba(200,217,160,.3)}
.phase-fill{height:100%;background:var(--sage);border-radius:4px;transition:width .5s}
.phase-labels{display:flex;justify-content:space-between}
.phase-labels span{font-size:10px;color:rgba(240,237,216,.3)}
.phase-labels .current{color:rgba(200,217,160,.7);font-weight:500}

/* Status row */
.status-row{display:flex;flex-wrap:wrap;gap:16px;margin-top:12px;font-size:12px}
.status-item{display:flex;align-items:center;gap:4px}
.status-item.waiting{color:rgba(245,158,11,.8)}
.status-item.day{color:rgba(240,237,216,.5)}
.status-item.next{color:rgba(200,217,160,.7)}
.status-item svg{width:12px;height:12px}

/* Expanded Detail */
.client-detail{border-top:1px solid rgba(74,102,80,.1);background:rgba(26,36,40,.2);display:none}
.client-detail.open{display:block}
.phase-pills{padding:16px 24px 8px;display:flex;flex-wrap:wrap;gap:6px}
.phase-pill{font-size:10px;padding:4px 10px;border-radius:999px;border:1px solid rgba(74,102,80,.2);color:rgba(240,237,216,.4);cursor:pointer;transition:all .2s}
.phase-pill:hover{color:rgba(240,237,216,.6)}
.phase-pill.active{background:rgba(200,217,160,.15);border-color:rgba(200,217,160,.4);color:var(--sage)}
.steps-list{padding:0 24px 20px}
.phase-group-label{font-size:10px;color:rgba(200,217,160,.5);text-transform:uppercase;letter-spacing:.1em;margin-top:12px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.phase-dot{width:8px;height:8px;border-radius:50%}
.step-row{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:8px;transition:background .15s}
.step-row.completed{background:rgba(200,217,160,.03)}
.step-row.in-progress{background:rgba(200,217,160,.08);border:1px solid rgba(200,217,160,.15)}
.step-row.waiting{background:rgba(245,158,11,.03);border:1px solid rgba(245,158,11,.1)}
.step-icon{width:16px;height:16px;flex-shrink:0}
.step-icon.done{color:var(--sage)}
.step-icon.wait{color:rgba(245,158,11,.7)}
.step-icon.progress{border:2px solid var(--sage);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
.step-icon.pending{border:1px solid rgba(74,102,80,.3);border-radius:50%}
.step-name{flex:1;font-size:12px;color:rgba(240,237,216,.5)}
.step-row.completed .step-name{color:rgba(240,237,216,.35);text-decoration:line-through}
.step-row.in-progress .step-name{color:var(--cream);font-weight:500}
.step-row.waiting .step-name{color:rgba(245,158,11,.8)}
.step-meta{display:flex;align-items:center;gap:8px}
.step-time{font-size:10px;color:rgba(240,237,216,.2)}
.step-owner{width:12px;height:12px;color:rgba(240,237,216,.2)}

/* Legend */
.legend{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;font-size:10px;color:rgba(240,237,216,.3);padding:8px 0}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-sep{margin:0 8px;color:rgba(74,102,80,.3)}

/* Empty State */
.empty-state{text-align:center;padding:48px 24px}
.empty-state svg{width:40px;height:40px;color:rgba(200,217,160,.3);margin:0 auto 12px}
.empty-state h3{font-size:18px;font-weight:600;color:var(--cream);margin-bottom:4px}
.empty-state p{font-size:14px;color:rgba(240,237,216,.4)}

/* Footer */
.footer{max-width:1200px;margin:48px auto 0;padding:24px 20px;border-top:1px solid rgba(74,102,80,.2);text-align:center}
.footer p{font-size:11px;color:rgba(240,237,216,.3);letter-spacing:.15em;text-transform:uppercase}

/* Responsive */
@media(max-width:640px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .status-row{gap:8px}
  .phase-pills{gap:4px}
  .client-top{flex-direction:column;gap:8px}
}
</style>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-inner">
      <div class="logo-area">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <div>
          <div class="logo-title">Constant Creates</div>
          <div class="logo-sub">Client Onboarding</div>
        </div>
      </div>
      <div class="status-badge">
        <span class="pulse-dot"></span>
        <span class="status-text" id="updateTime">Loading...</span>
      </div>
    </div>
    <div class="tabs">
      <a href="index.html" class="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Daily Brief
      </a>
      <a href="onboarding.html" class="tab active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
        Client Onboarding
      </a>
    </div>
  </div>
</header>

<div class="container" style="padding-bottom:64px">
  <div id="content" style="margin-top:16px">
    <div style="text-align:center;padding:80px 0">
      <div style="width:48px;height:48px;border:2px solid var(--sage);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div>
      <p style="font-size:13px;color:rgba(200,217,160,.7);text-transform:uppercase;letter-spacing:.15em">Loading Onboarding Data...</p>
    </div>
  </div>
</div>

<div class="footer">
  <p>Constant Creates Daily Brief — Built for Founders Who Move Fast</p>
</div>

<script>
const PHASES = ['Pre-Sale','Contract & Payment','Welcome','Brand Discovery','Asset Collection','Project Setup','Design Phase','Revisions','Launch','Handoff','Post-Launch'];
const PHASE_COLORS = {'Pre-Sale':'#60a5fa','Contract & Payment':'#a78bfa','Welcome':'#34d399','Brand Discovery':'#fbbf24','Asset Collection':'#fb923c','Project Setup':'#22d3ee','Design Phase':'#f472b6','Revisions':'#fb7185','Launch':'#c8d9a0','Handoff':'#2dd4bf','Post-Launch':'#a3e635'};

function svg(name) {
  const icons = {
    users: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
    alert: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    timer: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="12" y2="8"/><circle cx="12" cy="14" r="8"/></svg>',
    zap: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
    rocket: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/></svg>',
    user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
    bot: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>',
    chevron: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
  };
  return icons[name] || '';
}

function ownerIcon(owner) {
  if (owner === 'Faye') return svg('user');
  if (owner === 'Client') return svg('users');
  if (owner === 'Automated') return svg('bot');
  return svg('users');
}

function render(data) {
  const el = document.getElementById('content');
  if (!data || !data.onboarding) {
    el.innerHTML = `<div class="card empty-state fade-in d1">${svg('rocket')}<h3>No Onboarding Data Yet</h3><p>The onboarding system will appear here once data is available.</p></div>`;
    return;
  }

  const ob = data.onboarding;
  const stats = ob.stats;
  const clients = ob.activeClients || [];

  let html = '';

  // Stats card
  html += `<div class="card fade-in d1" style="margin-bottom:24px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h3 style="font-size:18px;font-weight:600;color:var(--cream);display:flex;align-items:center;gap:8px">
        <span style="width:20px;height:20px;color:var(--sage)">${svg('rocket')}</span>
        Client Onboarding
      </h3>
      <span style="font-size:11px;color:rgba(200,217,160,.5);text-transform:uppercase;letter-spacing:.1em">${clients.length} active</span>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label"><span style="width:14px;height:14px;color:var(--sage)">${svg('users')}</span><span>Active</span></div>
        <div class="stat-value accent">${stats.activeOnboardings}</div>
        <div class="stat-sub">Onboarding now</div>
      </div>
      <div class="stat-card">
        <div class="stat-label"><span style="width:14px;height:14px">${svg('check')}</span><span>Completed</span></div>
        <div class="stat-value">${stats.completedThisMonth}</div>
        <div class="stat-sub">This month</div>
      </div>
      <div class="stat-card">
        <div class="stat-label"><span style="width:14px;height:14px">${svg('timer')}</span><span>Avg Days</span></div>
        <div class="stat-value">${stats.avgDaysToComplete}</div>
        <div class="stat-sub">To complete</div>
      </div>
      <div class="stat-card">
        <div class="stat-label"><span style="width:14px;height:14px">${svg('alert')}</span><span>Bottleneck</span></div>
        <div class="stat-value" style="font-size:16px">${stats.bottleneckPhase}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label"><span style="width:14px;height:14px">${svg('clock')}</span><span>Waiting</span></div>
        <div class="stat-value">${stats.clientsWaiting}</div>
        <div class="stat-sub">On client action</div>
      </div>
    </div>
  </div>`;

  // Client cards
  clients.forEach((client, ci) => {
    const completedSteps = client.steps.filter(s => s.status === 'Completed').length;
    const totalSteps = client.steps.length;
    const currentPhaseIdx = PHASES.indexOf(client.currentPhase);
    const daysSince = Math.max(1, Math.floor((Date.now() - new Date(client.startDate).getTime()) / 86400000));
    const startStr = new Date(client.startDate).toLocaleDateString('en-US', {month:'short',day:'numeric'});
    const cardId = 'client-' + ci;

    // Phase bar HTML
    let phaseBar = '<div class="phase-bar">';
    PHASES.forEach((phase, i) => {
      const phaseSteps = client.steps.filter(s => s.phase === phase);
      const done = phaseSteps.filter(s => s.status === 'Completed').length;
      const pct = phaseSteps.length > 0 ? (done / phaseSteps.length * 100) : 0;
      const cls = i < currentPhaseIdx ? 'past' : i === currentPhaseIdx ? 'active' : '';
      phaseBar += `<div class="phase-segment ${cls}" title="${phase}: ${done}/${phaseSteps.length}">`;
      if (i === currentPhaseIdx) phaseBar += `<div class="phase-fill" style="width:${pct}%"></div>`;
      phaseBar += '</div>';
    });
    phaseBar += '</div>';

    // Steps grouped by phase
    let stepsHtml = '';
    PHASES.forEach(phase => {
      const phaseSteps = client.steps.filter(s => s.phase === phase);
      if (phaseSteps.length === 0) return;
      const done = phaseSteps.filter(s => s.status === 'Completed').length;
      const color = PHASE_COLORS[phase] || 'var(--sage)';

      stepsHtml += `<div class="phase-group" data-phase="${phase}">
        <div class="phase-group-label"><span class="phase-dot" style="background:${color}"></span>${phase} (${done}/${phaseSteps.length})</div>`;

      phaseSteps.forEach(step => {
        const isCompleted = step.status === 'Completed';
        const isProgress = step.status === 'In Progress';
        const isWaiting = step.status === 'Waiting on Client';
        const cls = isCompleted ? 'completed' : isProgress ? 'in-progress' : isWaiting ? 'waiting' : '';

        let icon;
        if (isCompleted) icon = `<span class="step-icon done">${svg('check')}</span>`;
        else if (isWaiting) icon = `<span class="step-icon wait">${svg('alert')}</span>`;
        else if (isProgress) icon = '<span class="step-icon progress"></span>';
        else icon = '<span class="step-icon pending"></span>';

        stepsHtml += `<div class="step-row ${cls}">
          ${icon}
          <span class="step-name">${step.step}</span>
          <div class="step-meta">
            ${step.timeEstimate ? `<span class="step-time">${step.timeEstimate}</span>` : ''}
            <span class="step-owner">${ownerIcon(step.owner)}</span>
          </div>
        </div>`;
      });
      stepsHtml += '</div>';
    });

    // Phase filter pills
    let pills = `<button class="phase-pill active" onclick="filterPhase('${cardId}', null, this)">All Phases</button>`;
    PHASES.forEach(phase => {
      const phaseSteps = client.steps.filter(s => s.phase === phase);
      if (phaseSteps.length === 0) return;
      const done = phaseSteps.filter(s => s.status === 'Completed').length;
      pills += `<button class="phase-pill" onclick="filterPhase('${cardId}', '${phase}', this)">${phase} (${done}/${phaseSteps.length})</button>`;
    });

    html += `<div class="client-card fade-in d${Math.min(ci + 2, 6)}" id="${cardId}">
      <div class="client-header" onclick="toggleClient('${cardId}')">
        <div class="client-top">
          <div style="flex:1">
            <div style="display:flex;align-items:center;flex-wrap:wrap">
              <span class="client-name">${client.business}</span>
              <span class="client-pkg">${client.package}</span>
            </div>
            <div class="client-sub">${client.name} · Started ${startStr}</div>
          </div>
          <div style="display:flex;align-items:center">
            <div class="client-pct">
              <div class="client-pct-val">${client.overallProgress}%</div>
              <div class="client-pct-sub">${completedSteps}/${totalSteps} steps</div>
            </div>
            <span class="chevron" id="${cardId}-chevron">${svg('chevron')}</span>
          </div>
        </div>
        ${phaseBar}
        <div class="phase-labels">
          <span>Pre-Sale</span>
          <span class="current">${client.currentPhase}</span>
          <span>Post-Launch</span>
        </div>
        <div class="status-row">
          ${client.waitingOnClient.length > 0 ? `<span class="status-item waiting"><span style="width:12px;height:12px">${svg('alert')}</span>${client.waitingOnClient.length} waiting on client</span>` : ''}
          <span class="status-item day"><span style="width:12px;height:12px">${svg('timer')}</span>Day ${daysSince}</span>
          <span class="status-item next"><span style="width:12px;height:12px">${svg('zap')}</span>Next: ${client.nextAction}</span>
        </div>
      </div>
      <div class="client-detail" id="${cardId}-detail">
        <div class="phase-pills" id="${cardId}-pills">${pills}</div>
        <div class="steps-list" id="${cardId}-steps">${stepsHtml}</div>
      </div>
    </div>`;
  });

  // Legend
  html += `<div class="legend fade-in d6">
    <span class="legend-item"><span style="width:12px;height:12px">${svg('user')}</span> Faye</span>
    <span class="legend-item"><span style="width:12px;height:12px">${svg('users')}</span> Client</span>
    <span class="legend-item"><span style="width:12px;height:12px">${svg('bot')}</span> Automated</span>
    <span class="legend-sep">|</span>
    <span class="legend-item"><span style="width:12px;height:12px;color:var(--sage)">${svg('check')}</span> Done</span>
    <span class="legend-item"><span style="width:12px;height:12px;border:2px solid var(--sage);border-top-color:transparent;border-radius:50%;display:inline-block"></span> In Progress</span>
    <span class="legend-item"><span style="width:12px;height:12px;color:var(--warn)">${svg('alert')}</span> Waiting</span>
    <span class="legend-item"><span style="width:12px;height:12px;border:1px solid rgba(74,102,80,.3);border-radius:50%;display:inline-block"></span> Not Started</span>
  </div>`;

  el.innerHTML = html;
}

function toggleClient(id) {
  const detail = document.getElementById(id + '-detail');
  const chevron = document.getElementById(id + '-chevron');
  detail.classList.toggle('open');
  chevron.classList.toggle('open');
}

function filterPhase(cardId, phase, btn) {
  // Update active pill
  const pills = document.getElementById(cardId + '-pills');
  pills.querySelectorAll('.phase-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');

  // Filter phase groups
  const steps = document.getElementById(cardId + '-steps');
  steps.querySelectorAll('.phase-group').forEach(g => {
    if (!phase || g.dataset.phase === phase) {
      g.style.display = '';
    } else {
      g.style.display = 'none';
    }
  });
}

// Load data — prefer embedded data (set by scheduled task), fall back to fetch
function boot(data) {
  const ts = data.footer?.lastUpdated || data.lastUpdated || '';
  document.getElementById('updateTime').textContent = 'Updated ' + ts;
  render(data);
}

if (typeof __embeddedData !== 'undefined') {
  boot(__embeddedData);
} else {
  fetch('/data.json')
    .then(r => r.json())
    .then(boot)
    .catch(() => {
      document.getElementById('content').innerHTML = '<div class="card empty-state"><h3>Unable to load data</h3><p>Please try refreshing the page.</p></div>';
    });
}
</script>

</body>
</html>
